
services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: homeservice-backend
    ports:
      - "8083:8000"
    volumes:
      - backend_data:/app/uploads
      - backend_db:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: homeservice-frontend
    ports:
      - "3001:80"
      - "3443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: homeservice-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend

volumes:
  backend_data:
  backend_db:
