version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: homeservice-backend
    ports:
      - "8083:8000"
    volumes:
      - backend_data:/app/uploads
      - backend_db:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: homeservice-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: homeservice-tunnel
    command: tunnel --no-autoupdate run --token MASUKAN_TOKEN_CLOUDFLARE_LU_DISINI
    restart: unless-stopped
    depends_on:
      - frontend

volumes:
  backend_data:
  backend_db:
